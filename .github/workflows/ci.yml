name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: python -m pip install uv
      - run: uv sync --frozen --all-extras
        working-directory: backend
      - run: .venv/bin/ruff check src tests
        working-directory: backend
      - run: .venv/bin/ruff format --check src tests
        working-directory: backend
      - run: .venv/bin/pytest -q
        working-directory: backend

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: corepack enable && corepack prepare yarn@1.22.22 --activate
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: npx tsc --noEmit
      - run: yarn test
      - run: yarn i18n:audit
      - run: yarn build

  database-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Start local Supabase database
        run: npx --yes supabase@2.109.1 start -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor,realtime,storage-api,postgrest,gotrue
      - run: npx --yes supabase@2.109.1 db reset
      - run: npx --yes supabase@2.109.1 test db supabase/tests/schema_smoke.sql
      - run: npx --yes supabase@2.109.1 test db supabase/tests/guest_data_rls.sql
      - run: node scripts/check-migration-layout.mjs
      - run: bash scripts/test-legacy-database-upgrade.sh

  runtime-auth-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: python -m pip install uv
      - run: uv sync --frozen --all-extras
        working-directory: backend
      - run: bash scripts/check-runtime-auth.sh

  configurator-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: node neloo-configurator/scripts/setup-env.test.mjs
      - run: node neloo-configurator/scripts/check-env.test.mjs
      - run: node scripts/check-ci-contract.mjs

  docker-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: node scripts/check-docker-release-readiness.mjs
      - run: docker build -f Dockerfile -t neloo-backend-root .
      - run: docker build -f backend/Dockerfile -t neloo-backend-service backend
