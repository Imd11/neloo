# Run frontend checks and repository spelling checks.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-railway-readiness:
    name: Check Docker/Railway readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Check Docker/Railway release readiness
        run: node scripts/check-docker-release-readiness.mjs
      - name: Build root backend image
        run: docker build -f Dockerfile -t neloo-backend-root .
      - name: Build backend service image
        run: docker build -f backend/Dockerfile -t neloo-backend-service backend

  format:
    name: Check frontend formatting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Use Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Check formatting
        continue-on-error: true
        run: yarn format:check

  lint:
    name: Check frontend linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Use Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Check linting
        continue-on-error: true
        run: yarn run lint

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Use Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build

  readme-spelling:
    name: Check README spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2
        continue-on-error: true
        with:
          ignore_words_file: frontend/.codespellignore
          path: README.md

  check-spelling:
    name: Check frontend spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2
        continue-on-error: true
        with:
          ignore_words_file: frontend/.codespellignore
          path: frontend/src
